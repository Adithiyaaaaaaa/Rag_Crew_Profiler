analyze_user_task:
  description: >
    Target user_id: {user_id}.
    First call lookup_user_by_id with the exact user_id.
    Then call lookup_reviews_by_user_id with the exact user_id.
    Use search_user_profile_data to find the target user's profile record.
    Use search_historical_reviews_data to find historical reviews written by this user.
    The exact lookup tools are primary because random Yelp IDs have no semantic meaning.
    The RAG tools are fallback tools and must receive natural language search_query strings, not raw JSON.
    Summarize the user's rating habits, likely cuisine or service preferences, common complaints,
    positive signals, and review-writing style.
  expected_output: >
    A concise Markdown profile of user {user_id}, grounded in retrieved Yelp data, with specific notes about
    rating habits and taste preferences.
  agent: user_analyst

analyze_item_task:
  description: >
    Target business_id: {business_id}.
    First call lookup_item_by_id with the exact business_id.
    Then call lookup_reviews_by_business_id with the exact business_id.
    Use search_restaurant_feature_data to find the target business record.
    Use search_historical_reviews_data to find historical reviews about this business.
    The Desktop latest_ai_development data stores this identifier as item_id, so search for both business_id
    and item_id wording when writing your search query.
    The exact lookup tools are primary because random Yelp IDs have no semantic meaning.
    The RAG tools are fallback tools and must receive natural language search_query strings, not raw JSON.
    Summarize the business categories, attributes, public sentiment, strengths, weaknesses, and any risk factors
    that may affect the target user's experience.
  expected_output: >
    A concise Markdown report about business {business_id}, grounded in retrieved Yelp data, including restaurant
    strengths and weaknesses.
  agent: item_analyst

predict_review_task:
  description: >
    Combine the user profile and business report from the previous tasks.
    Predict how user {user_id} would rate business {business_id}, and write a plausible review in that user's style.
    Compare the predicted result against the available ground truth only if it was supplied by main.py.
  expected_output: >
    Output ONLY valid JSON with exactly these keys:
    {"stars": 4.0, "text": "Predicted Yelp review text.", "rationale": "Brief evidence-based reason."}
    stars must be a number from 1.0 to 5.0.
  agent: prediction_modeler
